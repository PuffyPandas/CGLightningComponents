<template>
    <div class="slds-card slds-p-around_medium">
        <div class="slds-grid slds-wrap slds-grid_align-spread slds-m-bottom_small">
            <h2 class="slds-text-heading_medium">Close Case</h2>
            <lightning-button
                label="Close Case"
                variant="brand"
                onclick={handleOpen}
                disabled={isClosing}>
            </lightning-button>
        </div>

        <!-- Modal -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">

                    <header class="slds-modal__header">
                        <h2 id="modal-heading-01" class="slds-text-heading_medium">Provide Closure Details</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                        <div class="slds-form slds-form_stacked">
                            <lightning-input
                                type="text"
                                name="rootCause"
                                label="Root Cause"
                                value={rootCause}
                                required
                                onchange={handleInputChange}>
                            </lightning-input>

                            <lightning-textarea
                                name="description"
                                label="Description"
                                value={description}
                                onchange={handleInputChange}>
                            </lightning-textarea>

                            <lightning-textarea
                                name="comments"
                                label="Comments"
                                value={comments}
                                onchange={handleInputChange}>
                            </lightning-textarea>

                            <!-- File Upload -->
                            <div class="slds-m-top_medium">
                                <lightning-file-upload
                                    label="Upload Files (optional)"
                                    name="fileUploader"
                                    record-id={recordId}
                                    accept={acceptedFormats}
                                    onuploadfinished={handleUploadFinished}
                                    multiple>
                                </lightning-file-upload>
                                <template if:true={uploadedFiles.length}>
                                    <div class="slds-m-top_small">
                                        <p class="slds-text-title_caps">Files selected:</p>
                                        <ul class="slds-list_dotted slds-m-left_large">
                                            <template for:each={uploadedFiles} for:item="f">
                                                <li key={f.documentId}>{f.name}</li>
                                            </template>
                                        </ul>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <template if:true={errorMessage}>
                            <div class="slds-m-top_small">
                                <c-error-panel errors={normalizedErrors}></c-error-panel>
                            </div>
                        </template>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel" onclick={handleClose} disabled={isClosing}></lightning-button>
                        <lightning-button variant="brand" label="Submit & Close" onclick={handleSubmit} disabled={isClosing}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>

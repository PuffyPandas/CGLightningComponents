<template>
    
    <lightning-record-edit-form object-api-name="Lead" >
        <label for="companyfield"> Hospital </label>
        <lightning-input-field field-name="Company" id="companyfield" variant="label-hidden"></lightning-input-field>
        <lightning-input-field field-name="FirstName"></lightning-input-field>
        <lightning-input-field field-name="LastName"></lightning-input-field>
        <lightning-input-field field-name="Email"></lightning-input-field>
        <lightning-input-field field-name="Phone"></lightning-input-field>
        <lightning-input-field field-name="PostalCode"></lightning-input-field>
        <lightning-button label="Reset" type="reset"></lightning-button>
        <lightning-button label="Submit" type="submit" onclick={onsuccessaction} onerror={onerroraction}></lightning-button>
    </lightning-record-edit-form>
</template>
